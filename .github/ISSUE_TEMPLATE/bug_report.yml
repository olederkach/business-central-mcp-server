name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

        **Security vulnerabilities**: Do NOT report security issues here. Follow [SECURITY.md](https://github.com/olederkach/business-central-mcp-server/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure MCP server with ...
        2. Call tool ...
        3. See error ...
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport Mode
      description: How are you running the MCP server?
      options:
        - npm/stdio (npx)
        - Azure HTTP/SSE
        - Both
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Desktop
        - Claude.ai (remote MCP)
        - Copilot Studio
        - VS Code (GitHub Copilot)
        - Cursor
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      description: "Run: npx business-central-mcp-server --version"
      placeholder: "1.1.1"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error messages or logs. **Remove all credentials, tokens, tenant IDs, and client secrets before posting.**
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: security-check
    attributes:
      label: Security Checklist
      options:
        - label: I have removed all credentials, tokens, and secrets from this report
          required: true
        - label: This is not a security vulnerability (those go to SECURITY.md)
          required: true
