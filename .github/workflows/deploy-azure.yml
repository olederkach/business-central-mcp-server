name: Deploy to Azure Container Apps

# ══════════════════════════════════════════════════════════════════
#  SETUP GUIDE — Read this before running the workflow
# ══════════════════════════════════════════════════════════════════
#
#  This workflow deploys the MCP server to Azure Container Apps.
#  Before running it, you need to complete these one-time steps:
#
#  ── Step 1: Create Azure Infrastructure ──────────────────────
#
#  Option A: Use the Azure CLI script (recommended):
#    bash scripts/deployment/deploy-to-azure.sh
#
#  Option B: Create manually in Azure Portal:
#    1. Create a Resource Group (e.g. "mcp-bc-rg")
#    2. Create an Azure Container Registry (e.g. "mcpbcregistry")
#    3. Create a Container Apps Environment
#    4. Create a Container App (e.g. "mcp-bc-server")
#       - Image: any placeholder (workflow will update it)
#       - Ingress: enabled, external, port 3005
#
#  ── Step 2: Create Azure AD App Registration (for OIDC) ─────
#
#    1. Go to Azure Portal → Azure Active Directory → App registrations
#    2. Create a new registration (e.g. "github-deploy-mcp")
#    3. Under "Certificates & secrets" → "Federated credentials":
#       - Issuer: https://token.actions.githubusercontent.com
#       - Subject: repo:<your-github-user>/business-central-mcp-server:environment:production
#       - Audience: api://AzureADTokenExchange
#    4. Grant the app "Contributor" role on your Resource Group
#    5. Note: AZURE_CLIENT_ID = this app's Application (client) ID
#           AZURE_TENANT_ID = your Azure AD tenant ID
#           AZURE_SUBSCRIPTION_ID = your Azure subscription ID
#
#  ── Step 3: Create BC App Registration (for BC API access) ──
#
#    1. In Azure AD, create another app registration (e.g. "bc-mcp-api")
#    2. Add API permission: Dynamics 365 Business Central → API.ReadWrite.All
#    3. Create a client secret
#    4. Note: BC_CLIENT_ID = this app's Application (client) ID
#           BC_CLIENT_SECRET = the client secret value
#    5. In BC Admin Center, authorize this app for your environment
#
#  ── Step 4: Configure GitHub Secrets ─────────────────────────
#
#    Go to your repo → Settings → Secrets and variables → Actions
#    Add these secrets:
#
#    Azure OIDC (from Step 2):
#      AZURE_CLIENT_ID         = <app registration client ID>
#      AZURE_TENANT_ID         = <Azure AD tenant ID>
#      AZURE_SUBSCRIPTION_ID   = <Azure subscription ID>
#
#    Business Central (from Step 3 + BC Admin Center):
#      BC_TENANT_ID            = <your Entra ID / BC tenant ID>
#      BC_CLIENT_ID            = <BC app registration client ID>
#      BC_CLIENT_SECRET        = <BC app registration secret>
#      BC_COMPANY_ID           = <target BC company GUID>
#
#    Server security:
#      MCP_API_KEYS            = <generate with: openssl rand -base64 32>
#
#    Optional:
#      APPLICATIONINSIGHTS_CONNECTION_STRING = <App Insights connection string>
#
#  ── Step 5: Run the workflow ─────────────────────────────────
#
#    Go to Actions → "Deploy to Azure Container Apps" → Run workflow
#    Fill in the inputs (ACR name, Container App name, Resource Group)
#    and click "Run workflow"
#
# ══════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: "Image tag (defaults to git SHA)"
        required: false
        type: string
      acr_name:
        description: "Azure Container Registry name (e.g. mcpbcregistry)"
        required: true
        type: string
      container_app_name:
        description: "Azure Container App name (e.g. mcp-bc-server)"
        required: true
        type: string
      resource_group:
        description: "Azure Resource Group (e.g. mcp-bc-rg)"
        required: true
        type: string
      bc_environment_name:
        description: "BC environment name"
        required: true
        default: "Production"
        type: choice
        options:
          - Production
          - Sandbox

env:
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    permissions:
      id-token: write   # OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Validate required secrets ──
      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "${{ secrets.AZURE_TENANT_ID }}" ] && missing+=("AZURE_TENANT_ID")
          [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ] && missing+=("AZURE_SUBSCRIPTION_ID")
          [ -z "${{ secrets.BC_TENANT_ID }}" ] && missing+=("BC_TENANT_ID")
          [ -z "${{ secrets.BC_CLIENT_ID }}" ] && missing+=("BC_CLIENT_ID")
          [ -z "${{ secrets.BC_CLIENT_SECRET }}" ] && missing+=("BC_CLIENT_SECRET")
          [ -z "${{ secrets.BC_COMPANY_ID }}" ] && missing+=("BC_COMPANY_ID")
          [ -z "${{ secrets.MCP_API_KEYS }}" ] && missing+=("MCP_API_KEYS")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo ""
            echo "Configure these in GitHub → Settings → Secrets and variables → Actions"
            echo "See the setup guide in this workflow file for details."
            exit 1
          fi
          echo "All required secrets are configured"

      # ── Azure Login (OIDC federated credentials) ──
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Build & push to ACR ──
      - name: Login to ACR
        run: az acr login --name ${{ inputs.acr_name }}

      - name: Build and push image
        run: |
          IMAGE=${{ inputs.acr_name }}.azurecr.io/business-central-mcp-server
          docker build -t $IMAGE:${{ env.IMAGE_TAG }} -t $IMAGE:latest .
          docker push $IMAGE:${{ env.IMAGE_TAG }}
          docker push $IMAGE:latest

      # ── Sync GitHub Secrets → Container App Secrets ──
      - name: Configure Container App secrets
        run: |
          az containerapp secret set \
            --name ${{ inputs.container_app_name }} \
            --resource-group ${{ inputs.resource_group }} \
            --secrets \
              bc-tenant-id="${{ secrets.BC_TENANT_ID }}" \
              bc-client-id="${{ secrets.BC_CLIENT_ID }}" \
              bc-client-secret="${{ secrets.BC_CLIENT_SECRET }}" \
              bc-company-id="${{ secrets.BC_COMPANY_ID }}" \
              mcp-api-keys="${{ secrets.MCP_API_KEYS }}"

      # ── Deploy to Container Apps ──
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ${{ inputs.container_app_name }}
          resourceGroup: ${{ inputs.resource_group }}
          imageToDeploy: ${{ inputs.acr_name }}.azurecr.io/business-central-mcp-server:${{ env.IMAGE_TAG }}
          environmentVariables: >-
            NODE_ENV=production
            PORT=3005
            AUTH_MODE=api-key
            LOG_LEVEL=info
            METADATA_MODE=all
            CACHE_TTL_SECONDS=3600
            BC_TENANT_ID=secretref:bc-tenant-id
            BC_CLIENT_ID=secretref:bc-client-id
            BC_CLIENT_SECRET=secretref:bc-client-secret
            BC_COMPANY_ID=secretref:bc-company-id
            BC_ENVIRONMENT_NAME=${{ inputs.bc_environment_name }}
            MCP_API_KEYS=secretref:mcp-api-keys

      # ── Health check ──
      - name: Verify deployment
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ inputs.container_app_name }} \
            --resource-group ${{ inputs.resource_group }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Deployed to: https://$APP_URL"
          echo "Waiting for health check..."
          sleep 15

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL/health" || true)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Warning: Health check returned $STATUS (app may still be starting)"
          fi
