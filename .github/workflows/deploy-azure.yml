name: Deploy to Azure Container Apps

# ══════════════════════════════════════════════════════════════════
#  PREREQUISITE: Configure GitHub Secrets before running
#
#  Go to: Repo → Settings → Secrets and variables → Actions
#
#  Required secrets (credentials that must not be visible):
#    AZURE_CLIENT_ID         - Azure AD app registration for OIDC deployment
#    AZURE_TENANT_ID         - Azure AD tenant ID
#    AZURE_SUBSCRIPTION_ID   - Azure subscription ID
#    BC_CLIENT_ID            - App registration for BC API access
#    BC_CLIENT_SECRET        - App registration secret
#    MCP_API_KEYS            - API key(s) for MCP auth (generate: openssl rand -base64 32)
#
#  See docs/DEPLOYMENT.md for full setup instructions.
# ══════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      # ── Deployment ──
      environment:
        description: "GitHub environment (for secret scoping)"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: "Docker image tag (defaults to git SHA)"
        required: false
        type: string

      # ── Azure Infrastructure ──
      acr_name:
        description: "Azure Container Registry name"
        required: true
        type: string
      container_app_name:
        description: "Azure Container App name"
        required: true
        type: string
      resource_group:
        description: "Azure Resource Group"
        required: true
        type: string

      # ── Business Central Connection ──
      bc_tenant_id:
        description: "BC / Entra ID tenant ID (GUID)"
        required: true
        type: string
      bc_company_id:
        description: "BC company ID (GUID)"
        required: true
        type: string
      bc_environment_name:
        description: "BC environment name"
        required: true
        default: "Production"
        type: choice
        options:
          - Production
          - Sandbox

      # ── Server Configuration ──
      auth_mode:
        description: "Authentication mode"
        required: true
        default: "api-key"
        type: choice
        options:
          - api-key
          - oauth
      log_level:
        description: "Log level"
        required: true
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn
          - error
      metadata_mode:
        description: "BC metadata discovery mode"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - extensions-only
      cache_ttl_seconds:
        description: "Cache TTL in seconds"
        required: true
        default: "3600"
        type: string

env:
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    permissions:
      id-token: write   # OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Validate secrets ──
      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "${{ secrets.AZURE_TENANT_ID }}" ] && missing+=("AZURE_TENANT_ID")
          [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ] && missing+=("AZURE_SUBSCRIPTION_ID")
          [ -z "${{ secrets.BC_CLIENT_ID }}" ] && missing+=("BC_CLIENT_ID")
          [ -z "${{ secrets.BC_CLIENT_SECRET }}" ] && missing+=("BC_CLIENT_SECRET")
          [ -z "${{ secrets.MCP_API_KEYS }}" ] && missing+=("MCP_API_KEYS")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub Secrets: ${missing[*]}"
            echo "Configure at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets are configured"

      # ── Azure Login (OIDC) ──
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Build & push to ACR ──
      - name: Login to ACR
        run: az acr login --name ${{ inputs.acr_name }}

      - name: Build and push image
        run: |
          IMAGE=${{ inputs.acr_name }}.azurecr.io/business-central-mcp-server
          docker build -t $IMAGE:${{ env.IMAGE_TAG }} -t $IMAGE:latest .
          docker push $IMAGE:${{ env.IMAGE_TAG }}
          docker push $IMAGE:latest

      # ── Sync secrets to Container App ──
      - name: Configure Container App secrets
        run: |
          az containerapp secret set \
            --name ${{ inputs.container_app_name }} \
            --resource-group ${{ inputs.resource_group }} \
            --secrets \
              bc-client-id="${{ secrets.BC_CLIENT_ID }}" \
              bc-client-secret="${{ secrets.BC_CLIENT_SECRET }}" \
              mcp-api-keys="${{ secrets.MCP_API_KEYS }}"

      # ── Deploy ──
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ${{ inputs.container_app_name }}
          resourceGroup: ${{ inputs.resource_group }}
          imageToDeploy: ${{ inputs.acr_name }}.azurecr.io/business-central-mcp-server:${{ env.IMAGE_TAG }}
          environmentVariables: >-
            NODE_ENV=production
            PORT=3005
            AUTH_MODE=${{ inputs.auth_mode }}
            LOG_LEVEL=${{ inputs.log_level }}
            METADATA_MODE=${{ inputs.metadata_mode }}
            CACHE_TTL_SECONDS=${{ inputs.cache_ttl_seconds }}
            BC_TENANT_ID=${{ inputs.bc_tenant_id }}
            BC_ENVIRONMENT_NAME=${{ inputs.bc_environment_name }}
            BC_COMPANY_ID=${{ inputs.bc_company_id }}
            BC_CLIENT_ID=secretref:bc-client-id
            BC_CLIENT_SECRET=secretref:bc-client-secret
            MCP_API_KEYS=secretref:mcp-api-keys

      # ── Health check ──
      - name: Verify deployment
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ inputs.container_app_name }} \
            --resource-group ${{ inputs.resource_group }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Deployed to: https://$APP_URL"
          echo "MCP Endpoint: https://$APP_URL/mcp"
          echo ""
          echo "Waiting for health check..."
          sleep 15

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL/health" || true)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Warning: Health check returned $STATUS (app may still be starting)"
          fi
